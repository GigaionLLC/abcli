# GoReleaser v2 — cross-compiled, signed abctl binaries on `v*` tags.
# Validate locally: `goreleaser check` then `goreleaser release --snapshot --clean`.
version: 2

project_name: abctl

before:
  hooks:
    - go mod tidy

builds:
  - id: abctl
    main: ./cmd/abctl
    binary: abctl
    env:
      - CGO_ENABLED=0 # pure Go → trivial static cross-compile
    flags:
      - -trimpath
    # NOTE: this repo injects internal/cli.version (not GoReleaser's default main.version).
    ldflags:
      - -s -w -X github.com/GigaionLLC/abcli/internal/cli.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}" # reproducible: no wall-clock
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: abctl
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - NOTICE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# SBOM per archive (needs syft in PATH — the release workflow installs it).
sboms:
  - artifacts: archive

# Sign the checksums with cosign keyless (Sigstore + GitHub OIDC) → a bundle that
# `cosign verify-blob --bundle checksums.txt.sigstore.json checksums.txt` verifies.
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args: ["sign-blob", "--yes", "--bundle=${signature}", "${artifact}"]
    artifacts: checksum
    output: true

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  use: git # SCM-agnostic (works on both GitHub and GitLab)
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

# No explicit github:/gitlab: block — GoReleaser auto-detects the SCM (owner/name)
# from the git remote, so this same config releases on GitHub Actions and GitLab CI.
release:
  prerelease: auto # a -rc/-beta tag → pre-release
  footer: |
    ---
    ### abctl — command-line tool
    Cross-platform binaries are attached below. Verify a download:
    `cosign verify-blob --bundle checksums.txt.sigstore.json checksums.txt`

    ### abgui — macOS app (self-contained; a universal abctl is embedded inside it)
    Download **`abgui-*-macos.dmg`**, open it, and drag **abgui.app** to Applications.
    This is an unsigned build, so the first launch needs one command:
    `xattr -dr com.apple.quarantine /Applications/abgui.app`

    ---
    Licensed **AGPL-3.0-or-later**. 🤖 abctl and abgui are AI-authored under Gigaion, LLC's direction.

