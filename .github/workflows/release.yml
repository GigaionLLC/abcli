# Release — cross-compiled, signed abctl binaries on a v* tag.
# Build the config locally first: `goreleaser check` && `goreleaser release --snapshot --clean`.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the GitHub Release + upload assets
  id-token: write # cosign keyless signing (Sigstore OIDC)
  attestations: write # build-provenance attestations

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for the changelog
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0

      - name: goreleaser release
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

  # abgui is a macOS .app (with a universal abctl embedded) — GoReleaser can't build it,
  # so a macOS job packages the DMG installer + zip and uploads them to the SAME release.
  gui-release:
    name: abgui installer (.dmg)
    needs: goreleaser # the GitHub Release must exist before we upload to it
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history → a matching git-describe version
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build + package abgui (DMG + zip, universal abctl embedded)
        run: ./scripts/build-gui.sh dist
      - name: upload abgui to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            bin/abgui-*-macos.dmg \
            bin/abgui-*-macos.zip \
            docs/HOW-TO-RUN-UNSIGNED.txt \
            --clobber
