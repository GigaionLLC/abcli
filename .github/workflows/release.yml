# Release — cross-compiled, signed abctl binaries on a v* tag.
# Build the config locally first: `goreleaser check` && `goreleaser release --snapshot --clean`.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the GitHub Release + upload assets
  id-token: write # cosign keyless signing (Sigstore OIDC)
  attestations: write # build-provenance attestations

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for the changelog
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0

      - name: goreleaser release
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

  # abgui is a macOS .app (with a universal abctl embedded) — GoReleaser can't build it,
  # so a macOS job packages the DMG installer + zip and uploads them to the SAME release.
  gui-release:
    name: abgui signed installer (.dmg)
    needs: goreleaser # the GitHub Release must exist before we upload to it
    runs-on: macos-15
    env:
      HAS_APPLE_SIGNING_CERT: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history → a matching git-describe version
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: import Developer ID certificate
        if: ${{ env.HAS_APPLE_SIGNING_CERT == 'true' }}
        env:
          APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD || github.run_id }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/developer_id_application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "APPLE_CODESIGN_IDENTITY=${APPLE_CODESIGN_IDENTITY:-Developer ID Application}" >> "$GITHUB_ENV"
      - name: build + package abgui (DMG + zip, universal abctl embedded)
        env:
          APPLE_NOTARIZE: "0"
        run: ./scripts/build-gui.sh dist
      - name: upload abgui to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            bin/abgui-*-macos.dmg \
            bin/abgui-*-macos.zip \
            --clobber

  gui-notarize:
    name: abgui notarize + replace release assets
    needs: gui-release
    runs-on: macos-15
    timeout-minutes: 45
    continue-on-error: true
    env:
      HAS_APPLE_SIGNING_CERT: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 != '' }}
      HAS_APPLE_NOTARY_CREDS: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: import Developer ID certificate
        if: ${{ env.HAS_APPLE_SIGNING_CERT == 'true' && env.HAS_APPLE_NOTARY_CREDS == 'true' }}
        env:
          APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD || github.run_id }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/developer_id_application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_DEVELOPER_ID_APPLICATION_P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "APPLE_CODESIGN_IDENTITY=${APPLE_CODESIGN_IDENTITY:-Developer ID Application}" >> "$GITHUB_ENV"
      - name: build + notarize abgui
        if: ${{ env.HAS_APPLE_SIGNING_CERT == 'true' && env.HAS_APPLE_NOTARY_CREDS == 'true' }}
        env:
          APPLE_NOTARIZE: "1"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./scripts/build-gui.sh dist
      - name: replace abgui release assets with notarized builds
        if: ${{ env.HAS_APPLE_SIGNING_CERT == 'true' && env.HAS_APPLE_NOTARY_CREDS == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            bin/abgui-*-macos.dmg \
            bin/abgui-*-macos.zip \
            --clobber
