version: "2"

run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - unconvert
  exclusions:
    rules:
      # test files may ignore some errcheck noise
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
